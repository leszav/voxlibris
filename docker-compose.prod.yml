version: '3.8'
services:
  web:
    build: .
    image: xlibris/web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      REDIS_HOST: srv-captain--redis-voxli
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    networks:
      - captain-network
    # Production resource limits for performance optimization
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Security and performance settings
    security_opt:
      - no-new-privileges:true
    read_only: false # Allow writes to temp directories
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    # Health check configuration
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Graceful shutdown
    stop_grace_period: 30s

networks:
  captain-network:
    external: true
