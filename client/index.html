<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Yandex.Metrika counter (SPA) -->
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
           m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
           m[i].l=1*new Date();
           for (var j = 0; j < document.scripts.length; j++) { if (document.scripts[j].src === r) { return; } }
           k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js', 'ym');

        // Для SPA отключаем автоматическую отправку просмотров (defer: true)
        ym(106167747, 'init', {
          defer: true,
          clickmap: true,
          trackLinks: true,
          accurateTrackBounce: true,
          webvisor: true
        });
    </script>
    <!-- /Yandex.Metrika counter -->
    
    <!-- Primary Meta Tags -->
    <title>{{TITLE}}</title>
    <meta name="title" content="{{TITLE}}" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <meta name="keywords" content="{{KEYWORDS}}" />
    <meta name="author" content="{{SITE_NAME}}" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{OG_URL}}" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <meta property="og:site_name" content="{{SITE_NAME}}" />
    <meta property="og:locale" content="ru_RU" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="{{OG_URL}}" />
    <meta name="twitter:title" content="{{TITLE}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />
    <meta name="twitter:image" content="{{OG_IMAGE}}" />
    

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <!-- Structured Data для книжного сайта -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "{{SITE_NAME}}",
      "description": "Социальные книжные клубы с живыми чтецами",
      "url": "https://{{DOMAIN}}",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{SEARCH_URL}}",
        "query-input": "required name=search_term_string"
      },
      "sameAs": [
        "{{VK_LINK}}"
      ]
    }
    </script>
    
    <!-- Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "{{SITE_NAME}}",
      "description": "Платформа социальных книжных клубов с живыми чтецами",
      "url": "https://{{DOMAIN}}",
      "logo": "https://{{DOMAIN}}/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "support@{{DOMAIN}}"
      }
    }
    </script>
  </head>
  <body>
    <!-- Yandex.Metrika noscript (for users without JS) -->
    <noscript><div><img src="https://mc.yandex.ru/watch/106167747" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
