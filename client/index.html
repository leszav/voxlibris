<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f2ea" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VoxLibris" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Yandex.Metrika: здесь только noscript fallback.
         Инициализация tag.js и SPA hit выполняются из JS-бандла (client/src/lib/yandexMetrika.tsx). -->
    
    <!-- Primary Meta Tags -->
    <title>{{TITLE}}</title>
    <meta name="title" content="{{TITLE}}" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <meta name="keywords" content="{{KEYWORDS}}" />
    <meta name="author" content="{{SITE_NAME}}" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{OG_URL}}" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <meta property="og:site_name" content="{{SITE_NAME}}" />
    <meta property="og:locale" content="ru_RU" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="{{OG_URL}}" />
    <meta name="twitter:title" content="{{TITLE}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />
    <meta name="twitter:image" content="{{OG_IMAGE}}" />
    

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Structured Data для книжного сайта -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "{{SITE_NAME}}",
      "description": "Социальные книжные клубы с живыми чтецами",
      "url": "https://{{DOMAIN}}",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{SEARCH_URL}}",
        "query-input": "required name=search_term_string"
      },
      "sameAs": [
        "{{VK_LINK}}"
      ]
    }
    </script>
    
    <!-- Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "{{SITE_NAME}}",
      "description": "Платформа социальных книжных клубов с живыми чтецами",
      "url": "https://{{DOMAIN}}",
      "logo": "https://{{DOMAIN}}/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "support@{{DOMAIN}}"
      }
    }
    </script>
  </head>
  <body>
    <!-- Yandex.Metrika noscript fallback (основной код счетчика загружается из React-приложения) -->
    <noscript><div><img src="https://mc.yandex.ru/watch/106167747" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
